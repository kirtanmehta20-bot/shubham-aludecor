<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>25mm Series Configurations | Shubham Aludecor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            color: #333;
            background-color: #f8f9fa;
            line-height: 1.6;
        }
        
        header {
            background: rgba(0, 0, 0, 0.9);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header a {
            color: white;
            text-decoration: none;
            font-weight: 500;
        }

        .container {
            max-width: 1000px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .page-title {
            text-align: center;
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: #1a252c;
            margin-bottom: 10px;
        }

        .page-subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 50px;
            font-size: 1.1rem;
        }

        /* Clickable Card Grid */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
        }

        .option-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            background: #ffffff;
            padding: 40px 20px;
            border-radius: 12px;
            text-decoration: none;
            color: inherit;
            border: 1px solid #eaeaea;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            transition: all 0.3s ease;
        }

        .option-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.1);
            border-color: #1a252c;
        }

        .card-icon {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        .card-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            margin: 0 0 15px 0;
            color: #1a252c;
        }

        .view-btn {
            margin-top: auto;
            color: #4da6ff;
            font-weight: 600;
            font-size: 0.95rem;
            transition: color 0.3s;
        }

        .option-card:hover .view-btn {
            color: #1a252c;
        }
    </style>
</head>
<body>

    <header>
        <a href="sliding-windows.html">⬅ Back to Windows</a>
        <a href="https://wa.me/919586232321" target="_blank">Contact Us</a>
    </header>

    <div class="container">
        <h1 class="page-title">25mm Premium Series</h1>
        <p class="page-subtitle">Select a configuration below to open its detailed structural page.</p>

        <div class="options-grid">
            <a href="2-track.html" class="option-card">
                <div class="card-icon">🪟</div>
                <h2 class="card-title">2 Track</h2>
                <span class="view-btn">View Details →</span>
            </a>

            <a href="3-track.html" class="option-card">
                <div class="card-icon">🦟</div>
                <h2 class="card-title">3 Track</h2>
                <span class="view-btn">View Details →</span>
            </a>

            <a href="2-track-grill.html" class="option-card">
                <div class="card-icon">🛡️</div>
                <h2 class="card-title">2 Track + Grill</h2>
                <span class="view-btn">View Details →</span>
            </a>

            <a href="3-track-grill.html" class="option-card">
                <div class="card-icon">⭐</div>
                <h2 class="card-title">3 Track + Grill</h2>
                <span class="view-btn">View Details →</span>
            </a>
        </div>
    </div>

</body>
</html>
