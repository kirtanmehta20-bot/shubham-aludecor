<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>25mm Series Configurations | Shubham Aludecor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            color: #1a252c;
            background-color: #fafbfc;
            line-height: 1.6;
        }
        
        header {
            background: rgba(15, 23, 30, 0.95);
            backdrop-filter: blur(10px);
            padding: 1.2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header a {
            color: #ffffff;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            transition: color 0.3s;
        }
        /* Logo Styling */
        .logo-link {
            display: flex;
            align-items: center;
        }

        .header-logo {
            height: 40px; /* Adjust this number if you want the logo bigger or smaller */
            width: auto;
            display: block;
        }

        /* Upgraded Contact Button to match the premium vibe */
        .contact-btn {
            background-color: #ffffff;
            color: #1a252c !important;
            padding: 8px 20px;
            border-radius: 4px;
            font-weight: 600 !important;
            transition: background 0.3s ease;
        }

        .contact-btn:hover {
            background-color: #e2e8f0;
        }

        header a:hover {
            color: #a8b8d0;
        }

        .container {
            max-width: 1100px;
            margin: 80px auto 100px auto;
            padding: 0 20px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            color: #1a252c;
            margin: 0 0 15px 0;
            letter-spacing: -0.5px;
        }

        .decorative-line {
            width: 60px;
            height: 3px;
            background-color: #1a252c;
            margin: 0 auto 20px auto;
        }

        .page-subtitle {
            color: #555;
            font-size: 1.15rem;
            font-weight: 300;
            max-width: 600px;
            margin: 0 auto;
        }

   /* Container for all cards */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 30px;
  max-width: 1100px;
  margin: 0 auto;
}

/* Option 1: Architectural Card Styling */
.card {
  display: flex;
  flex-direction: column;
  background-color: #ffffff;
  padding: 40px 30px;
  border: 1px solid #e2e8f0;
  border-left: 4px solid #1a252c;
  box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
  transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
}

.card:hover {
  transform: translateX(8px);
  box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
  border-left: 8px solid #1a252c;
}

.card-number {
  font-family: 'Playfair Display', serif;
  font-size: 2.5rem;
  color: #cbd5e1;
  margin-bottom: 10px;
}

.card-title {
  font-size: 1.5rem;
  font-weight: 600;
  margin-bottom: 30px;
  flex-grow: 1;
}

.view-specs {
  font-size: 0.85rem;
  font-weight: 600;
  letter-spacing: 1px;
  color: #1a252c;
  text-decoration: none;
}

.view-specs:hover {
  color: #64748b;
}
    </style>
</head>
<body>

   <header>
        <a href="index.html" class="logo-link">
            <img src="logo.png" alt="Shubham Aludecor" class="header-logo">
        </a>
        <a href="https://wa.me/919586232321" target="_blank" class="contact-btn">Contact Us</a>
    </header>

    <div class="container">
        <div class="page-header">
            <h1 class="page-title">25mm Premium Series</h1>
            <div class="decorative-line"></div>
            <p class="page-subtitle">Select an architectural configuration below to explore its structural drawings and specifications.</p>
        </div>

   <div class="card-grid">
  <div class="card">
    <div class="card-number">01</div>
    <h3 class="card-title">2 Track</h3>
    <a href="25mm-2-track.html" class="view-specs">VIEW SPECS &rarr;</a>
  </div>
  
  <div class="card">
    <div class="card-number">02</div>
    <h3 class="card-title">3 Track</h3>
    <a href="25mm-3-track.html" class="view-specs">VIEW SPECS &rarr;</a>
  </div>
  
  <div class="card">
    <div class="card-number">03</div>
    <h3 class="card-title">2 Track + Grill</h3>
    <a href="25mm-2-track-grill.html" class="view-specs">VIEW SPECS &rarr;</a>
  </div>

  <div class="card">
    <div class="card-number">04</div>
    <h3 class="card-title">3 Track + Grill</h3>
    <a href="25mm-3-track-grill.html" class="view-specs">VIEW SPECS &rarr;</a>
  </div>
</div>    

</body>
</html>
