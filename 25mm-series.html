<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>25mm Series Configurations | Shubham Aludecor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            color: #1a252c;
            background-color: #fafbfc;
            line-height: 1.6;
        }
        
        header {
            background: rgba(15, 23, 30, 0.95);
            backdrop-filter: blur(10px);
            padding: 1.2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header a {
            color: #ffffff;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            transition: color 0.3s;
        }
        /* Logo Styling */
        .logo-link {
            display: flex;
            align-items: center;
        }

        .header-logo {
            height: 40px; /* Adjust this number if you want the logo bigger or smaller */
            width: auto;
            display: block;
        }

        /* Upgraded Contact Button to match the premium vibe */
        .contact-btn {
            background-color: #ffffff;
            color: #1a252c !important;
            padding: 8px 20px;
            border-radius: 4px;
            font-weight: 600 !important;
            transition: background 0.3s ease;
        }

        .contact-btn:hover {
            background-color: #e2e8f0;
        }

        header a:hover {
            color: #a8b8d0;
        }

        .container {
            max-width: 1100px;
            margin: 80px auto 100px auto;
            padding: 0 20px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            color: #1a252c;
            margin: 0 0 15px 0;
            letter-spacing: -0.5px;
        }

        .decorative-line {
            width: 60px;
            height: 3px;
            background-color: #1a252c;
            margin: 0 auto 20px auto;
        }

        .page-subtitle {
            color: #555;
            font-size: 1.15rem;
            font-weight: 300;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Premium Card Grid */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 30px;
        }

        .option-card {
            position: relative;
            display: flex;
            flex-direction: column;
            background: #ffffff;
            padding: 50px 30px;
            border-radius: 16px;
            text-decoration: none;
            color: #1a252c;
            border: 1px solid #eef2f5;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            overflow: hidden;
            z-index: 1;
        }

        /* The Dark Hover Invert Effect */
        .option-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #1a252c;
            z-index: -1;
            transform: scaleY(0);
            transform-origin: bottom;
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .option-card:hover {
            transform: translateY(-10px);
            border-color: #1a252c;
            box-shadow: 0 20px 40px rgba(26, 37, 44, 0.15);
        }

        .option-card:hover::before {
            transform: scaleY(1);
        }

        .option-card:hover .card-number,
        .option-card:hover .card-title,
        .option-card:hover .view-btn {
            color: #ffffff;
        }

        .card-number {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            font-weight: 700;
            color: #e2e8f0;
            margin-bottom: 20px;
            transition: color 0.4s ease;
        }

        .card-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.4rem;
            font-weight: 600;
            margin: 0 0 20px 0;
            transition: color 0.4s ease;
        }

        .view-btn {
            margin-top: auto;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: color 0.4s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .view-btn::after {
            content: '→';
            font-size: 1.2rem;
            transition: transform 0.3s ease;
        }

        .option-card:hover .view-btn::after {
            transform: translateX(5px);
        }
    </style>
</head>
<body>

   <header>
        <a href="index.html" class="logo-link">
            <img src="logo.png" alt="Shubham Aludecor" class="header-logo">
        </a>
        <a href="https://wa.me/919586232321" target="_blank" class="contact-btn">Contact Us</a>
    </header>

    <div class="container">
        <div class="page-header">
            <h1 class="page-title">25mm Premium Series</h1>
            <div class="decorative-line"></div>
            <p class="page-subtitle">Select an architectural configuration below to explore its structural drawings and specifications.</p>
        </div>

   <div class="card-grid">
  <div class="card">
    <div class="card-number">01</div>
    <h3 class="card-title">2 Track</h3>
    <a href="25mm-2-track.html" class="view-specs">VIEW SPECS &rarr;</a>
  </div>
  
  <div class="card">
    <div class="card-number">02</div>
    <h3 class="card-title">3 Track</h3>
    <a href="25mm-3-track.html" class="view-specs">VIEW SPECS &rarr;</a>
  </div>
  
  <div class="card">
    <div class="card-number">03</div>
    <h3 class="card-title">2 Track + Grill</h3>
    <a href="25mm-2-track-grill.html" class="view-specs">VIEW SPECS &rarr;</a>
  </div>

  <div class="card">
    <div class="card-number">04</div>
    <h3 class="card-title">3 Track + Grill</h3>
    <a href="25mm-3-track-grill.html" class="view-specs">VIEW SPECS &rarr;</a>
  </div>
</div>    

</body>
</html>
