<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Brochures | Shubham Aludecor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f9f9f9;
            --card-bg: #ffffff;
            --text-main: #111111;
            --text-muted: #666666;
            --accent: #222222;
            --accent-hover: #444444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 0;
        }

        /* Premium Header / Navigation */
        header {
            background: var(--card-bg);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eeeeee;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .nav-link {
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-link:hover {
            color: var(--text-main);
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 80px 20px 40px 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .hero h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 16px;
        }

        .hero p {
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: 300;
        }

        /* Grid Layout */
        .catalog-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px 80px 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
        }

        /* Editorial Product Card */
        .brochure-card {
            background: var(--card-bg);
            border-radius: 0px; /* Sharp modern edges */
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s ease;
            display: flex;
            flex-direction: column;
        }

        .brochure-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 38px rgba(0,0,0,0.08);
        }

        /* Document Preview Placeholder Mockup */
        .preview-box {
            background: #eaeaea;
            height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border-bottom: 1px solid #f0f0f0;
        }

        .preview-box::before {
            content: "PDF";
            font-size: 5rem;
            font-weight: 700;
            color: rgba(0,0,0,0.05);
            position: absolute;
        }
