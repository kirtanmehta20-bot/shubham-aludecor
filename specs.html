        /* HEADER */
        header { padding: 20px 5%; border-bottom: 1px solid rgba(188, 156, 108, 0.2); display: flex; justify-content: space-between; align-items: center;}
        .brand { color: var(--white); text-decoration: none; font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 700; letter-spacing: 2px; }
        .brand span { color: var(--gold); }
        
        /* CONTENT SECTION */
        .content-wrapper { max-width: 1200px; margin: 80px auto; padding: 0 5%; display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; }
        .text-box h1 { font-size: 3rem; margin-bottom: 10px; color: var(--gold); line-height: 1.1;}
        .text-box h2 { font-size: 1.5rem; margin-bottom: 30px; font-weight: 300; color: #d1d5db; font-family: 'Montserrat', sans-serif; }
        .text-box p { font-size: 1.1rem; color: #aaaaaa; margin-bottom: 40px; }
        
        /* FEATURES LIST */
        .feature-list { list-style: none; margin-bottom: 40px;}
        .feature-list li { margin-bottom: 20px; font-size: 1.05rem; display: flex; align-items: flex-start; gap: 15px; }
        .feature-list i { color: var(--gold); margin-top: 5px; }
        
        /* IMAGE BOX */
        .image-box { border: 1px solid rgba(188, 156, 108, 0.3); border-radius: 4px; overflow: hidden; height: 500px; background: #1a1a1a; display: flex; align-items: center; justify-content: center; }
        .image-box img { width: 100%; height: 100%; object-fit: cover; opacity: 0.9; }
        
        /* BUTTONS */
        .button-group { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
        .brochure-btn { display: inline-block; text-decoration: none; color: var(--charcoal); background: var(--gold); border: 1px solid var(--gold); padding: 12px 28px; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; transition: all 0.3s ease; }
        .brochure-btn:hover { background: transparent; color: var(--gold); }
        .back-btn { display: inline-block; color: #d1d5db; text-decoration: none; text-transform: uppercase; letter-spacing: 1px; font-size: 0.85rem; font-weight: 500; border-bottom: 1px solid transparent; transition: all 0.3s ease; }
        .back-btn:hover { color: var(--gold); border-bottom: 1px solid var(--gold); }
